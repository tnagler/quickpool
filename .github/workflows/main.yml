name: CMake

on: 
  push:
  pull_request:
  release:

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally
    # well on Windows or Mac.  You can convert this to a matrix build if you need
    # cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "Windows Latest MSVC",
            os: windows-latest,
            build_type: "Release",
            cmake_args: '-G "Visual Studio 17 2022" -A x64'
          }
        - {
            name: "Windows Latest MinGW",
            os: windows-latest,
            build_type: "Release",
            cmake_args: '-G "MinGW Makefiles" -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++'
          }
        - {
            name: "Ubuntu Latest GCC",
            os: ubuntu-latest,
            build_type: "Debug",
            cmake_args: "-DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++"
          }
        - {
            name: "macOS Latest Clang",
            os: macos-latest,
            build_type: "Release",
            cmake_args: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++"
          }

    steps:
    - uses: actions/checkout@v6

    - name: Add MinGW to PATH
      if: matrix.config.name == 'Windows Latest MinGW'
      run: echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.config.build_type}} ${{matrix.config.cmake_args}}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{matrix.config.build_type}}

    - name: Test
      working-directory: ${{github.workspace}}/build
      # Execute tests defined by the CMake configuration.  
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{matrix.config.build_type}} --verbose

    - name: Get code coverage
      working-directory: ${{github.workspace}}/build
      if: runner.os == 'Linux'
      run: |
        g++ -std=c++11 -o test -pthread -fprofile-arcs -ftest-coverage ../test.cpp
        ./test
        gcov -o . ../test.cpp

    - name: Upload coverage report
      uses: codecov/codecov-action@v6
      if: runner.os == 'Linux'
      with:
        token: ${{secrets.CODECOV_TOKEN}}
        files: quickpool.hpp.gcov

  sanitizers:
    name: ${{ matrix.sanitizer.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
        - {
            name: "Ubuntu Clang ASAN/LSAN/UBSAN",
            cmake_option: "QUICKPOOL_TEST_SANITIZE",
            runtime_env: "ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 UBSAN_OPTIONS=halt_on_error=1"
          }
        - {
            name: "Ubuntu Clang TSAN",
            cmake_option: "QUICKPOOL_TEST_THREAD_SANITIZE",
            runtime_env: "TSAN_OPTIONS=halt_on_error=1"
          }

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build-sanitize
        -DCMAKE_BUILD_TYPE=RelWithDebInfo
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_CXX_COMPILER=clang++
        -D${{matrix.sanitizer.cmake_option}}=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/build-sanitize --config RelWithDebInfo

    - name: Test
      working-directory: ${{github.workspace}}/build-sanitize
      run: ${{matrix.sanitizer.runtime_env}} ctest --build-config RelWithDebInfo --output-on-failure
